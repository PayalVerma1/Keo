name: Deploy Socket Server to Azure

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/azure-webapp.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "tsconfig.socket.json"
      - "server.ts"
      - "prisma/**"
      - "src/lib/config/**"
      - "src/lib/modules/websocket/**"
  workflow_dispatch:

# Azure App Service accepts only one active OneDeploy operation per app. Queue
# newer socket deployments rather than allowing a second deployment to return 409.
concurrency:
  group: azure-keo-socket-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build Socket Server
        run: pnpm run build:socket

      - name: Create Azure Runtime Package
        run: |
          rm -rf azure-socket-package
          mkdir azure-socket-package
          cp package.json package-lock.json azure-socket-package/
          cp -R dist azure-socket-package/dist
          # Copy prisma generated client if it exists
          if [ -d "node_modules/.prisma" ]; then
            mkdir -p azure-socket-package/node_modules/.prisma
            cp -R node_modules/.prisma azure-socket-package/node_modules/
          fi
          cd azure-socket-package
          npm install --omit=dev --ignore-scripts
          # Create a startup script so Azure runs from the correct directory
          echo '#!/bin/sh' > startup.sh
          echo 'cd /home/site/wwwroot' >> startup.sh
          echo 'NODE_ENV=production node dist/server.js' >> startup.sh
          chmod +x startup.sh

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: keo-socket
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: azure-socket-package
